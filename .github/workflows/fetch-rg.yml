name: Fetch Roland Garros Matches

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch matches
        run: python scripts/fetch_matches.py

      - name: Commit and push if changed
        run: |
          git add data/matches.json
          git diff --staged --quiet || (git commit -m "chore: update matches [skip ci]" && git push)
